<!DOCTYPE html>
<html>
  <head>
    <title>HOME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      ul,ol {
        list-style: none;
      }

      body {
        background-image: url("aaron-mello-emdfKg_LRs0-unsplash.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        background-position-y: 22%;
        font-size: 17px;
        color: rgb(8, 8, 8);
      }

      #nav {
        padding: 15px 10px;
        display: flex;
        justify-content: space-between;
        font-size: 19px;
      }

      #nav > ul,ol {
        display: flex;
      }

      #nav > ul > li {
        padding: 0 10px;
      }

      #nav > ol > li {
        padding: 0 10px;
        margin-right: 9px;
      }

      li:hover{
        text-decoration: underline 4px rgb(179, 179, 179) solid;
        background-color: rgba(228, 226, 226, 0.164);
        cursor: pointer;
      }

      .logo{
        color: rgb(1, 158, 85); 
        font-size: 21px;
      }

      .logo >a{
        text-decoration: none;
        color: rgb(1, 158, 85); font-size: 21px;
      }

      .join{
        background-color: aqua;
        padding: 1px 11px;
        font-size: 16.5px;
        border: none;
      }

      .join > a{
        color: rgb(0, 0, 0);
        text-decoration: none;
      }
      .join:hover{
        cursor: pointer;
        background-color: rgb(1, 158, 85);
        padding: 2 12px;
        font-size: 17.5px;
        transition: 1s;
        border-radius: 2px;
      }
      #section {
        display: flex;
        justify-content: center;
        margin-top: 160px;
        text-align: center;
      }

      #content > h1 {
        font-size: 41px;
      }

      #content > #sub {
        text-align: center;
        margin: 10px 0;
      }

      #content > #search {
        display: flex;
        background-color: white;
        border-radius: 5px;
        height: 35px;
      }

      #content > #search > input {
        width: 70%;
        padding: 5px 5px;
        border: none;
      }

      #content > #search > button {
        width: 20%;
        height: 35px;
      }

      #content > #search > p {
        width: 10%;
        color: black;
        background-color: rgb(249, 216, 255);
        padding: 2px 4px;
        cursor: pointer;
        height: 23px;
        margin-top: 5px;
        border-radius: 3px;
        text-align: center;
      }

      .sea{
        font-size: 16px;
        font-weight: 500;
        color: rgb(3, 3, 3);
        background-color: greenyellow;
        border: none;
        cursor: pointer;
      }
      .sea >a{
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="nav">
      <ul>
        <li class="logo">
          <a href="http://www.youtube.com"><strong style="color: white;">Pick</strong>Bazar</a>
        </li>
        <li>Grocery</li>
      </ul>
      <ol>
        <li>Offer</li>
        <li> <img src="download.webp" alt="img" height="17px" width="16px">Need Help</li>
        <li>English <img src="OIP.webp" alt="img" height="11px" width="13px"></li>
        <button class="join">
          <a target="_blank" href="https://www.google.com/">Join</a>
        </buton>
      </ol>
    </div>
    <div id="section">
      <div id="content">
        <h1>Groceries Delivered in 90 Minute</h1>
        <p id="sub">
          Get your healthy foods & snacks delivered at your doorsteps all day
          everyday
        </p>
        <div id="search">
          <p class="Grocery">Grocery</p>
          <input type="search" placeholder="Search here for grocery" />
          <button class="sea">
            <a target="_blank" href="https://www.amazon.com/fmc/learn-more">Search</a>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
